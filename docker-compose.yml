services:
  # Container Aplikasi (Laravel + Web Server)
  app:
    build: .
    container_name: rental_ps_app
    restart: always
    volumes:
      - .:/var/www
    working_dir: /var/www
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=rental_ps
      - DB_USERNAME=root
      - DB_PASSWORD=root_pass

  nginx:
    image: nginx:alpine
    container_name: rental_ps_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app

  # Container Database (MariaDB)
  db:
    image: mariadb:11
    container_name: rental_ps_db
    restart: always
    command: --innodb-buffer-pool-size=128M --max-connections=20
    environment:
      - MARIADB_ROOT_PASSWORD=root_pass
      - MARIADB_DATABASE=rental_ps
    ports:
      - "3307:3306"
    volumes:
      - rental_db_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rental_db_data: